<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#0d1525"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4a8"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="tealFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4a8" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#14b8a6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#2dd4a8" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#2dd4a8" stroke-width="0.5">
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="150" y1="0" x2="150" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="450" y1="0" x2="450" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="750" y1="0" x2="750" y2="320"/>
  </g>

  <!-- Accent glow line top -->
  <rect x="60" y="0" width="780" height="2" rx="1" fill="url(#teal)" opacity="0.3"/>

  <!-- Left decorative element — prompt bracket -->
  <g transform="translate(65, 100)" filter="url(#glow)" opacity="0.7">
    <text font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace" font-size="80" font-weight="300" fill="#2dd4a8">&gt;</text>
  </g>

  <!-- Main title -->
  <text x="140" y="155" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', system-ui, sans-serif" font-size="62" font-weight="800" fill="#f0fdf9" letter-spacing="-1.5">
    Promptius<tspan fill="#2dd4a8">Maximus</tspan>
  </text>

  <!-- Blinking cursor -->
  <rect x="658" y="118" width="3" height="45" rx="1.5" fill="#2dd4a8" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle -->
  <text x="142" y="195" font-family="'Inter', 'SF Pro Display', system-ui, sans-serif" font-size="17" font-weight="400" fill="#94a3b8" letter-spacing="3.5">
    AI VIDEO &amp; IMAGE GENERATION TOOLKIT
  </text>

  <!-- Divider line -->
  <rect x="142" y="215" width="120" height="1.5" rx="0.75" fill="#2dd4a8" opacity="0.4"/>

  <!-- Tool icons row — teal circles representing supported tools -->
  <g transform="translate(142, 240)">
    <!-- Seedance -->
    <circle cx="16" cy="16" r="16" fill="#2dd4a8" opacity="0.15"/>
    <text x="16" y="21" font-family="monospace" font-size="11" fill="#2dd4a8" text-anchor="middle" font-weight="600">S</text>
    <text x="16" y="48" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Seedance</text>

    <!-- Kling -->
    <circle cx="82" cy="16" r="16" fill="#2dd4a8" opacity="0.15"/>
    <text x="82" y="21" font-family="monospace" font-size="11" fill="#2dd4a8" text-anchor="middle" font-weight="600">K</text>
    <text x="82" y="48" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Kling</text>

    <!-- LTX -->
    <circle cx="148" cy="16" r="16" fill="#2dd4a8" opacity="0.15"/>
    <text x="148" y="21" font-family="monospace" font-size="11" fill="#2dd4a8" text-anchor="middle" font-weight="600">L</text>
    <text x="148" y="48" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">LTX-2</text>

    <!-- Nano Banana -->
    <circle cx="214" cy="16" r="16" fill="#2dd4a8" opacity="0.15"/>
    <text x="214" y="21" font-family="monospace" font-size="11" fill="#2dd4a8" text-anchor="middle" font-weight="600">N</text>
    <text x="214" y="48" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">NanoBanana</text>

    <!-- Remotion -->
    <circle cx="294" cy="16" r="16" fill="#2dd4a8" opacity="0.15"/>
    <text x="294" y="21" font-family="monospace" font-size="11" fill="#2dd4a8" text-anchor="middle" font-weight="600">R</text>
    <text x="294" y="48" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Remotion</text>

    <!-- ComfyUI -->
    <circle cx="370" cy="16" r="16" fill="#2dd4a8" opacity="0.15"/>
    <text x="370" y="21" font-family="monospace" font-size="11" fill="#2dd4a8" text-anchor="middle" font-weight="600">C</text>
    <text x="370" y="48" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">ComfyUI</text>

    <!-- CapCut -->
    <circle cx="440" cy="16" r="16" fill="#2dd4a8" opacity="0.15"/>
    <text x="440" y="21" font-family="monospace" font-size="11" fill="#2dd4a8" text-anchor="middle" font-weight="600">CC</text>
    <text x="440" y="48" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">CapCut</text>

    <!-- More indicator -->
    <text x="510" y="22" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#475569" font-weight="500">+6 more</text>
  </g>

  <!-- Stats badges -->
  <g transform="translate(660, 240)">
    <rect width="80" height="28" rx="6" fill="#2dd4a8" opacity="0.1" stroke="#2dd4a8" stroke-opacity="0.2" stroke-width="1"/>
    <text x="40" y="19" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#2dd4a8" text-anchor="middle" font-weight="600">140 files</text>

    <rect x="90" width="95" height="28" rx="6" fill="#2dd4a8" opacity="0.1" stroke="#2dd4a8" stroke-opacity="0.2" stroke-width="1"/>
    <text x="137" y="19" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#2dd4a8" text-anchor="middle" font-weight="600">14 AI models</text>
  </g>

  <!-- Bottom accent -->
  <rect x="60" y="318" width="780" height="2" rx="1" fill="url(#teal)" opacity="0.15"/>
</svg>